# Collects CLA signatures on pull requests using CLA-assistant.
#
# ONE-TIME SETUP (do this on GitHub after pushing the repo):
#   1. Create a Personal Access Token (classic) with the `repo` scope, or a
#      fine-grained token with read/write "Contents" on this repository.
#   2. Add it as a repository secret named  PERSONAL_ACCESS_TOKEN
#      (Settings -> Secrets and variables -> Actions -> New repository secret).
#   3. That's it. On each PR the bot posts the CLA link; contributors comment
#      "I have read the CLA Document and I hereby sign the CLA" to sign.
#      Signatures are stored in a JSON file on the `cla-signatures` branch,
#      which the action creates automatically.
#
# Adjust `path-to-document` if your default branch is not `main`, and add any
# bot/maintainer usernames to `allowlist`.

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/appmakernetwork/cmedit/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: 'appmakernetwork,dependabot[bot]'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA.'
